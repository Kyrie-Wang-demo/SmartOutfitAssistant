name: Bug report
description: Report a reproducible bug
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Describe the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. ...\n2. ...\n3. ..."
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: Windows 11, .NET 10, Edge/Chrome
